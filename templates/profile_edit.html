{% extends 'base.html' %}
{% block title %}Edit Profile — CRUMB{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-title">Edit profile</h1>
    </div>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label class="form-label">Bio</label>
        <textarea name="bio" class="form-input form-textarea" rows="4" maxlength="300" placeholder="What are you building?">{{ current_user.bio }}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Location</label>
        <input type="text" name="location" class="form-input" value="{{ current_user.location }}" placeholder="Philadelphia, PA" maxlength="100">
      </div>
      <button type="submit" class="btn btn-gold btn-full">Save changes</button>
    </form>
    <p class="auth-footer">
      <a href="{{ url_for('profile', username=current_user.username) }}" class="gold-link">← Back to profile</a>
    </p>
  </div>
</div>
{% endblock %}
